<!DOCTYPE html>
<html>
<head>
  <title>Board Game Library</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon"/ >
  <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>

  <header>
    <h1><a href="/boardgame-library/">Boardgame Library</a></h1>

    <div class="selectDiv noArrow">
      <input type="text" name="searchBar" id="searchBar" placeholder="Name">
    </div>

    <div class="selectDiv">
      <select id="selectPlayer">
        <option value="">N° Players</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="selectDiv">
      <select id="selectLength">
        <option value="">Length</option>
        <option value="Very Short">Very Short (30min)</option>
        <option value="Short">Short (60min)</option>
        <option value="Average">Average (90min)</option> 
        <option value="Long">Long (120min)</option>
        <option value="Very Long">Very Long (150+min)</option>
      </select>
    </div>

    <div class="selectDiv">
      <select id="selectComplex">
        <option value="">Complexity</option>
        <option value="Super Casual">Super Casual</option>
        <option value="Casual">Casual</option>
        <option value="Medium">Medium</option>
        <option value="Heavy">Heavy</option>
        <option value="Mega Heavy">Mega Heavy</option>
      </select>
    </div>

    <div class="selectDiv">
      <select id="selectMode">
        <option value="">Mode</option>
        <option value="Competitive">Competitive</option>
        <option value="Cooperative">Cooperative</option>
        <option value="Team-based">Team-based</option>
        <option value="Traitor-based">Traitor-based</option>
      </select>
    </div>
  </header>

  <div id="gameFilters">
    <label><input type="checkbox" id="checkNew">New</label>
    <label><input type="checkbox" id="checkPlayed">Played</label>
    <label><input type="checkbox" id="checkReplay">Replay</label>
    <label><input type="checkbox" id="digitalIncluded">Digital</label>
    <label><input type="checkbox" id="minPlayers">Min Players</label>
    <label><input type="checkbox" id="maxPlayers">Max Players</label>
    <label><input type="checkbox" id="unplayedGames" checked>Reveal Unplayed</label>
    <label><input type="checkbox" id="pagination">Pagination?</label>
    <label id='itemsperpage'><input type="text" value="50" id="paginationItems">Items per Page</label>
  </div>

  <div id="searchButtons">
    <button id="list">Show me the games!</button>
    <button id="chooseOne">Pick 1</button>
    <button id="chooseThree">Pick 3</button>
  </div>

  <aside id="settings">
    <button id="increaseImg" aria-label="Increase images size"><i class="fa-solid fa-magnifying-glass-plus fa-xl"></i></button>
    <button id="decreaseImg" aria-label="Decrease images size"><i class="fa-solid fa-magnifying-glass-minus fa-xl"></i></button>
    <button id="resetImgSize" aria-label="Restore images size to default"><i class="fa-solid fa-arrows-rotate fa-xl"></i></button>
    <button id='pageleft'>Previous Page</button>
    <button id='pageright'>Next Page</button>

  </aside>

  <aside id="chosenGamesList">
    <ol id="chosenList">
    </ol>
  </aside>

  <main id="selectedGames">
    <p>No games selected at the moment.</p>
  </main>

  <script src="https://apis.google.com/js/api.js"></script>
  <script src="gsheets.js"></script>
  <script src="sort.js"></script>
  <script src="storage.js"></script>
  <script src="https://kit.fontawesome.com/3f51c67b48.js" crossorigin="anonymous" data-search-pseudo-elements defer></script>
</body>
</html>
